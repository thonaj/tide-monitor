server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://__BACKEND_HOST__/api/;
        proxy_ssl_server_name on;
        proxy_set_header Cookie "";
    }
}
