name: Deploy to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: tide-monitor-rg

jobs:
  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group if not exists
        run: |
          if ! az group show --name ${{ env.AZURE_RESOURCE_GROUP }} --output none 2>/dev/null; then
            echo "Creating resource group ${{ env.AZURE_RESOURCE_GROUP }}..."
            az group create --name ${{ env.AZURE_RESOURCE_GROUP }} --location eastus
          else
            echo "Resource group ${{ env.AZURE_RESOURCE_GROUP }} already exists"
          fi

      - name: Deploy Dev Infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/dev.parameters.json

      - name: Deploy Prod Infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/prod.parameters.json

  build:
    needs: infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Dev ACR
        run: az acr login --name tideacrdev

      - name: Build and push backend to Dev ACR
        run: |
          docker build -t tideacrdev.azurecr.io/tide-monitor-backend:${{ github.sha }} -f backend/Dockerfile .
          docker push tideacrdev.azurecr.io/tide-monitor-backend:${{ github.sha }}

      - name: Build and push frontend to Dev ACR
        run: |
          docker build -t tideacrdev.azurecr.io/tide-monitor-frontend:${{ github.sha }} -f frontend/Dockerfile .
          docker push tideacrdev.azurecr.io/tide-monitor-frontend:${{ github.sha }}

      - name: Login to Prod ACR
        run: az acr login --name tideacrprod

      - name: Build and push backend to Prod ACR
        run: |
          docker build -t tideacrprod.azurecr.io/tide-monitor-backend:${{ github.sha }} -f backend/Dockerfile .
          docker push tideacrprod.azurecr.io/tide-monitor-backend:${{ github.sha }}

      - name: Build and push frontend to Prod ACR
        run: |
          docker build -t tideacrprod.azurecr.io/tide-monitor-frontend:${{ github.sha }} -f frontend/Dockerfile .
          docker push tideacrprod.azurecr.io/tide-monitor-frontend:${{ github.sha }}

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v7

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Apps
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/app.bicep \
            --parameters \
              environmentName=tide-monitor-dev \
              acrName=tideacrdev \
              acrUsername=${{ secrets.DEV_ACR_USERNAME }} \
              acrPassword=${{ secrets.DEV_ACR_PASSWORD }} \
              backendImage=tideacrdev.azurecr.io/tide-monitor-backend:${{ github.sha }} \
              frontendImage=tideacrdev.azurecr.io/tide-monitor-frontend:${{ github.sha }}

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v7

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Apps
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/app.bicep \
            --parameters \
              environmentName=tide-monitor-prod \
              acrName=tideacrprod \
              acrUsername=${{ secrets.PROD_ACR_USERNAME }} \
              acrPassword=${{ secrets.PROD_ACR_PASSWORD }} \
              backendImage=tideacrprod.azurecr.io/tide-monitor-backend:${{ github.sha }} \
              frontendImage=tideacrprod.azurecr.io/tide-monitor-frontend:${{ github.sha }}
